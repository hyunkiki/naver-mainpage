<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Naver" />
    <meta property="og:description" content="Naver" />
    <meta
      property="og:image"
      content="http://www.mysite.com/article/article1_featured_image.jpg"
    />
    <meta
      property="og:url"
      content="http://www.mysite.com/article/article1.html"
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Naver" />
    <meta name="twitter:description" content="Naver" />
    <meta
      name="twitter:image"
      content="http://www.mysite.com/article/article1.html"
    />
    <meta name="twitter:domain" content="Naver" />
    <title>Naver</title>
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <link
      rel="stylesheet"
      href="https://maxst.icons8.com/vue-static/landings/line-awesome/line-awesome/1.3.0/css/line-awesome.min.css"
    />
    <link rel="stylesheet" href="./css/comm.css" />
    <script src="./js/comm.js"></script>
  </head>
  <body>
    <main id="main">
      <section class="naver_intro">
        <header id="main_header">
          <img
            class="white_logo_img"
            src="./img/naver_logo_white.png"
            alt="naver_logo_white"
          />
          <ul class="gnb_wr">
            <li class="gnb_lst">회사소개</li>
            <li class="gnb_lst">서비스</li>
            <li class="gnb_lst">홍보센터</li>
            <li class="gnb_lst">ESG</li>
            <li class="gnb_lst">인재채용</li>
          </ul>
          <div class="right_box">
            <div class="global_box">
              <i class="las la-globe"></i>
            </div>
            <div class="hamberger_box">
              <div class="hamberger_menu">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
              </div>
            </div>
          </div>
        </header>
        <div class="inner">
          <div class="intro_wr">
            <p class="intro_exp">Connecting Technology, Empowering People</p>
            <h1 class="intro_tit">
              네이버는 기술로 사람과 세상을 연결하며 <br />
              더 나은 일상과 새로운 가능성을 만들어갑니다
            </h1>
            <div class="dots_wr">
              <div class="dot acitve"></div>
              <div class="dot"></div>
              <div class="dot"></div>
              <div class="dot"></div>
            </div>
          </div>
        </div>
      </section>
      <section class="naver_service">
        <div class="inner">
          <div class="tit_box">
            <h2 class="service_min_tit">Key Point Service</h2>
            <div class="dot"></div>
          </div>
          <h1 class="service_tit">네이버의 핵심 서비스</h1>
          <div class="sub_txt_box">
            <p class="service_exp">
              검색과 쇼핑검색과 쇼핑을 넘어 AI와 글로벌 콘텐츠까지, 네이버는
              독보적인 기술력을 바탕으로 <br />
              사용자의 삶을 연결하고 새로운 디지털 생태계를 확장해 나갑니다.
            </p>
            <div class="more_btn">자세히 보기</div>
          </div>
          <ul class="card_wr">
            <li class="card_lst">
              <img class="card_img" src="./img/service1.jpg" alt="service1" />
            </li>
            <li class="card_lst">
              <img class="card_img" src="./img/service2.jpg" alt="service2" />
            </li>
            <li class="card_lst">
              <img class="card_img" src="./img/service3.jpg" alt="service3" />
            </li>
            <li class="card_lst">
              <img class="card_img" src="./img/service4.jpg" alt="service4" />
            </li>
            <li class="card_lst">
              <img class="card_img" src="./img/service5.jpg" alt="service5" />
            </li>
          </ul>
        </div>
      </section>
      <section class="naver_tech">
        <div class="inner">
          <div class="tit_box">
            <h1 class="tech_tit">Technology</h1>
            <div class="dot"></div>
          </div>
        </div>
      </section>
      <section class="naver_value">
        <div class="inner">
          <div class="tit_box">
            <h1 class="value_tit">Our Value</h1>
            <div class="dot"></div>
          </div>
        </div>
      </section>
      <section class="naver_news">
        <div class="inner">
          <div class="tit_box">
            <h1 class="news_tit">News</h1>
            <div class="dot"></div>
          </div>
        </div>
      </section>
    </main>
    <footer id="footer">
      <div class="inner">
        <img class="ft_logo" src="./img/naver_logo.png" alt="naver_logo" />
      </div>
    </footer>
  </body>
</html>
